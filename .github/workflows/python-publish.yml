name: Build and publish

on:
  release:
    types: [created]

jobs:
  release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          manylinux: auto
          command: build
          args: --release --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist

  pypi-publish:
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist